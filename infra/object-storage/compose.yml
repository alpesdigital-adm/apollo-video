services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: apollo-local
      MINIO_ROOT_PASSWORD: apollo-local-change-me
    ports:
      - 127.0.0.1:59000:9000
      - 127.0.0.1:59001:9001
    volumes:
      - apollo-object-storage:/data
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  apollo-object-storage:
